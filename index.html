<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC 26 Live Control Hub</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121824;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: #1a2333;
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            box-sizing: border-box;
            margin: auto;
        }
        h2 { text-align: center; color: #f4f6f9; margin-top: 0; font-size: 1.6rem; letter-spacing: 0.5px; }
        h3 { text-align: center; color: #a0aec0; margin-top: 0; font-size: 1.2rem; }
        
        .app-screen { display: none; }
        .app-screen.active { display: block; }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 30px;
        }
        .menu-btn {
            background: #243146;
            color: white;
            border: 2px solid #2d3748;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s ease;
        }
        .menu-btn:active { transform: scale(0.98); }
        .menu-btn.primary { border-color: #ff6b00; background: #1f2636; }
        .btn-icon { font-size: 1.6rem; }
        
        .screen-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 15px;
        }
        .back-btn {
            background: #243146;
            color: #edf2f7;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .sync-loader-text { font-size: 1rem; font-weight: bold; color: #ff6b00; margin: 5px 0; text-align: center; }
        .db-status { font-size: 0.95rem; color: #a0aec0; margin-top: 5px; font-weight: 500; text-align: center; }

        #reader { width: 100%; border-radius: 14px; overflow: hidden; background: #171d29; }
        
        #reader border { border: none !important; }
        #reader select { display: none !important; }
        
        .ticket-card {
            margin-top: 25px;
            background: #171d29;
            border-radius: 14px;
            overflow: hidden;
            border-top: 6px solid #ff6b00;
            display: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .status-header { padding: 14px; font-weight: bold; font-size: 1.15rem; text-align: center; text-transform: uppercase; }
        .status-granted { background-color: #10b981; }
        .status-denied { background-color: #ef4444; }
        .status-duplicate { background-color: #f59e0b; }
        .ticket-body { padding: 20px; }
        .field-group { margin-bottom: 15px; }
        .field-label { font-size: 0.75rem; text-transform: uppercase; color: #718096; letter-spacing: 1px; margin-bottom: 3px; }
        .field-value { font-size: 1.1rem; color: #edf2f7; font-weight: 500; }
        .founder-badge { display: inline-block; background: #ff6b00; color: black; padding: 4px 12px; border-radius: 6px; font-weight: bold; font-size: 0.85rem; margin-top: 4px; }

        .qr-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 15px;
            max-height: 480px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .qr-card {
            background: #171d29;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }
        .qr-card-name {
            font-size: 0.8rem;
            font-weight: bold;
            color: #edf2f7;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.4em;
            line-height: 1.2em;
        }
        .qr-card-id { font-size: 0.7rem; color: #718096; margin-bottom: 8px; }
        .qr-display-box {
            background: white;
            padding: 6px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: inline-block;
        }
        .qr-card-actions {
            display: flex;
            gap: 6px;
            width: 100%;
        }
        .qr-action-btn {
            flex: 1;
            background: #243146;
            color: white;
            border: 1px solid #2d3748;
            padding: 6px 2px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 500;
        }
        .qr-action-btn.orange { background: #ff6b00; color: white; border: none; }
        
        .pdf-compile-btn {
            background: #ff6b00;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
        }
        
        #hiddenEnginePlayground { position: absolute; left: -9999px; top: -9999px; width: 150px; height: 150px; background: white; }
    </style>
</head>
<body>

<div class="container">

    <div id="menuScreen" class="app-screen active">
        <h2>SMC 26 Live Portal</h2>
        <h3>Cloud Linked Dashboard</h3>
        
        <p id="mainLoadingMsg" class="sync-loader-text">🔄 Connecting to Google Drive database...</p>
        <div id="mainDbStatus" class="db-status">Awaiting initialization...</div>

        <div class="menu-grid">
            <button class="menu-btn primary" onclick="navigateTo('importScreen')">
                <span class="btn-icon">📋</span>
                <div>
                    <div>1. Passport Matrix & QR Grid</div>
                    <span style="font-size: 0.8rem; font-weight: normal; color: #a0aec0;">Generate neatly arranged PDF document</span>
                </div>
            </button>
            
            <button class="menu-btn" onclick="navigateTo('scannerScreen')">
                <span class="btn-icon">📷</span>
                <div>
                    <div>2. Launch Camera Scanner</div>
                    <span style="font-size: 0.8rem; font-weight: normal; color: #a0aec0;">Scan attendee passport codes</span>
                </div>
            </button>
        </div>
    </div>

    <div id="importScreen" class="app-screen">
        <div class="screen-header">
            <span style="font-weight: bold; font-size: 1.1rem;">Arranged QR Passports</span>
            <button class="back-btn" onclick="navigateTo('menuScreen')">⬅️ Menu</button>
        </div>

        <button class="pdf-compile-btn" id="pdfBtn" onclick="compileArrangedPdf()">📄 Download Organized PDF Booklet</button>

        <div id="generatorPanel">
            <div class="qr-grid-container" id="qrCodeArrangementGrid"></div>
        </div>
    </div>

    <div id="scannerScreen" class="app-screen">
        <div class="screen-header">
            <span style="font-weight: bold; font-size: 1.1rem;">Live Access Control</span>
            <button class="back-btn" onclick="navigateTo('menuScreen')">⬅️ Exit Cam</button>
        </div>

        <div id="reader"></div>

        <div id="ticketCard" class="ticket-card">
            <div id="statusBanner" class="status-header">Decoding Code...</div>
            <div class="ticket-body">
                <div class="field-group"><div class="field-label">Full Name</div><div id="displayName" class="field-value">-</div></div>
                <div class="field-group"><div class="field-label">Church / Ministry</div><div id="displayChurch" class="field-value">-</div></div>
                <div class="field-group"><div class="field-label">Status Details</div><div id="displayStatus" class="field-value">-</div></div>
            </div>
        </div>
    </div>

</div>

<div id="hiddenEnginePlayground"></div>

<script>
    const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbW1qcXEo17SlLlMHnhsbt1PGkaTrzlL1KQ2nIIwGpiS2JIi4wqkfTSysdWZ7hG1FHGLqkccX-zwEj/pub?output=csv";

    let localDatabase = {};
    let checkedInCache = new Set();
    let html5QrcodeScanner = null;
    const BASE_SCANNER_URL = window.location.origin + window.location.pathname;

    function navigateTo(screenId) {
        document.querySelectorAll('.app-screen').forEach(screen => screen.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');

        if (screenId === 'scannerScreen') {
            startHardwareFrontCamera();
        } else {
            killHardwareCamera();
        }
    }

    async function syncCloudDatabase() {
        try {
            const response = await fetch(GOOGLE_SHEET_CSV_URL);
            const csvText = await response.text();
            
            Papa.parse(csvText, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    localDatabase = {};
                    const gridContainer = document.getElementById('qrCodeArrangementGrid');
                    gridContainer.innerHTML = ""; 
                    let founderCount = 0;

                    results.data.forEach(row => {
                        const id = row["Guest ID"] || row["ID"] || row["guest id"];
                        if(id) {
                            const cleanId = id.trim();
                            
                            const firstName = row["FULL NAME"] || row["Full Name"] || "";
                            const lastName = row["_2"] || row["_3"] || row["_4"] || row["Unnamed: 3"] || "";
                            const combinedName = `${firstName} ${lastName}`.trim();

                            localDatabase[cleanId] = {
                                title: (row["Title"] || "").trim(),
                                name: combinedName || "",
                                church: (row["CHURCH"] || row["Church"] || "N/A").trim(),
                                specialStatus: (row["Special Status"] || "").trim(),
                                dinnerAccess: String(row["Dinner Access"] || "TRUE").toUpperCase() === "TRUE"
                            };

                            if (localDatabase[cleanId].specialStatus === "Founder in-person") {
                                founderCount++;
                                const generatedLink = `${BASE_SCANNER_URL}?id=${cleanId}`;
                                
                                const card = document.createElement('div');
                                card.className = 'qr-card';
                                
                                const displayNameString = localDatabase[cleanId].name ? `${localDatabase[cleanId].title} ${localDatabase[cleanId].name}` : `Blank (${cleanId})`;
                                
                                card.innerHTML = `
                                    <div class="qr-card-name" title="${displayNameString}">${displayNameString}</div>
                                    <div class="qr-card-id">${cleanId}</div>
                                    <div class="qr-display-box" id="visual_qr_${cleanId}"></div>
                                    <div class="qr-card-actions">
                                        <button class="qr-action-btn" onclick="navigator.clipboard.writeText('${generatedLink}'); alert('Link Copied!');">📋 Link</button>
                                        <button class="qr-action-btn orange" onclick="downloadSingleQr('${cleanId}', '${localDatabase[cleanId].name || cleanId}')">💾 Save</button>
                                    </div>
                                `;
                                
                                gridContainer.appendChild(card);

                                new QRCode(document.getElementById(`visual_qr_${cleanId}`), {
                                    text: cleanId,
                                    width: 100,
                                    height: 100,
                                    correctLevel: QRCode.CorrectLevel.H
                                });
                            }
                        }
                    });

                    const totalRows = Object.keys(localDatabase).length;
                    document.getElementById('mainLoadingMsg').style.display = "none";
                    document.getElementById('mainDbStatus').innerText = `✅ Connected Live! Loaded ${totalRows} records. (${founderCount} Founders mapped)`;
                    document.getElementById('mainDbStatus').style.color = "#10b981";

                    const urlParams = new URLSearchParams(window.location.search);
                    if (urlParams.has('id')) {
                        navigateTo('scannerScreen');
                        setTimeout(() => { processAccess(urlParams.get('id')); }, 500);
                    }
                }
            });
        } catch(err) {
            document.getElementById('mainLoadingMsg').innerText = "❌ Sync Connection Failed";
            document.getElementById('mainDbStatus').innerText = "Could not reach Google Sheets.";
            document.getElementById('mainDbStatus').style.color = "#ef4444";
        }
    }

    async function compileArrangedPdf() {
        const btn = document.getElementById('pdfBtn');
        btn.innerText = "⏳ Generating Organized PDF Template...";
        btn.disabled = true;

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4'); 
        
        const playground = document.getElementById('hiddenEnginePlayground');

        const itemsPerPage = 12; 
        const colWidth = 56;
        const rowHeight = 62;
        const startX = 16;
        const startY = 20;

        let counter = 0;
        const founderIds = Object.keys(localDatabase).filter(id => localDatabase[id].specialStatus === "Founder in-person");

        for (let i = 0; i < founderIds.length; i++) {
            const id = founderIds[i];
            const guest = localDatabase[id];

            if (counter > 0 && counter % itemsPerPage === 0) {
                doc.addPage();
            }

            const localIndex = counter % itemsPerPage;
            const col = localIndex % 3;
            const row = Math.floor(localIndex / 3);

            const x = startX + (col * colWidth) + (col * 5); 
            const y = startY + (row * rowHeight) + (row * 3); 

            playground.innerHTML = "";
            const qrObj = new QRCode(playground, { text: id, width: 150, height: 150, correctLevel: QRCode.CorrectLevel.H });
            
            await new Promise(resolve => setTimeout(resolve, 80));
            const imgEl = playground.querySelector('img');
            
            if (imgEl && imgEl.src) {
                doc.setDrawColor(210, 214, 219);
                doc.rect(x, y, colWidth, rowHeight - 2);

                doc.addImage(imgEl.src, 'PNG', x + 10, y + 4, 36, 36);

                doc.setFont("Helvetica", "bold");
                doc.setFontSize(8);
                doc.setTextColor(20, 24, 33);
                
                const rawName = `${guest.title} ${guest.name}`.trim() || "Blank Passport ID";
                const splitName = doc.splitTextToSize(rawName, colWidth - 6);
                doc.text(splitName, x + (colWidth / 2), y + 45, { align: "center" });

                doc.setFont("Helvetica", "normal");
                doc.setFontSize(7);
                doc.setTextColor(110, 120, 135);
                doc.text(`ID: ${id}`, x + (colWidth / 2), y + 55, { align: "center" });
            }
            counter++;
        }

        doc.save("SMC26_Organized_Passports.pdf");
        btn.innerText = "📄 Download Organized PDF Booklet";
        btn.disabled = false;
    }

    // ENFORCED FRONT CAMERA CONFIGURATION ONLY
    function startHardwareFrontCamera() {
        if(html5QrcodeScanner === null) {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 15, 
                qrbox: 250,
                rememberLastUsedCamera: false,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            });
        }
        // Force the scanner constraint strictly to the user-facing/front camera lens
        html5QrcodeScanner.render(onScanSuccess, onScanError, { facingMode: "user" });
        
        setTimeout(() => {
            const selectDropdown = document.querySelector("#reader select");
            if (selectDropdown) selectDropdown.style.display = "none";
        }, 300);
    }

    function killHardwareCamera() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear().catch(err => console.log("Camera component closed cleanly."));
        }
    }

    function downloadSingleQr(guestId, guestName) {
        const playground = document.getElementById('hiddenEnginePlayground');
        playground.innerHTML = "";
        new QRCode(playground, { text: guestId, width: 256, height: 256, correctLevel: QRCode.CorrectLevel.H });
        setTimeout(() => {
            const img = playground.querySelector('img');
            if(img) {
                const a = document.createElement('a');
                a.href = img.src;
                a.download = `QR_Founder_${guestName.replace(/\s+/g, '_')}.png`;
                a.click();
            }
        }, 300);
    }

    function processAccess(guestId) {
        const card = document.getElementById('ticketCard');
        const banner = document.getElementById('statusBanner');
        card.style.display = "block";
        const cleanedId = guestId.trim();

        if (!localDatabase[cleanedId]) {
            banner.className = "status-header status-denied";
            banner.innerText = "❌ Ticket ID Not Registered";
            return;
        }

        const guest = localDatabase[cleanedId];
        document.getElementById('displayName').innerText = guest.name ? `${guest.title} ${guest.name}`.trim() : "Blank (Unfilled)";
        document.getElementById('displayChurch').innerText = guest.church || "N/A";
        
        const statusDiv = document.getElementById('displayStatus');
        if(guest.specialStatus === "Founder in-person") {
            statusDiv.innerHTML = `<span class="founder-badge">⭐ FOUNDER IN-PERSON</span>`;
        } else {
            statusDiv.innerText = guest.specialStatus || "Regular Guest";
        }

        if (!guest.dinnerAccess) {
            banner.className = "status-header status-denied";
            banner.innerText = "❌ No Dinner Access Pass";
            return;
        }
        if (checkedInCache.has(cleanedId)) {
            banner.className = "status-header status-duplicate";
            banner.innerText = "⚠️ Already Checked In";
            return;
        }

        checkedInCache.add(cleanedId);
        banner.className = "status-header status-granted";
        banner.innerText = "✅ Access Granted";
    }

    function onScanSuccess(decodedText) {
        killHardwareCamera();
        processAccess(decodedText);
        setTimeout(() => { startHardwareFrontCamera(); }, 4000);
    }
    
    function onScanError(err) {}

    window.onload = syncCloudDatabase;
</script>
</body>
</html>
