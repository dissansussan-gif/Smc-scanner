<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC 26 Control Hub</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121824;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #1a2333;
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            box-sizing: border-box;
            margin: auto;
        }
        h2 { text-align: center; color: #f4f6f9; margin-top: 0; font-size: 1.6rem; letter-spacing: 0.5px; }
        h3 { text-align: center; color: #a0aec0; margin-top: 0; font-size: 1.2rem; }
        
        /* App Page/Screen Architecture */
        .app-screen { display: none; }
        .app-screen.active { display: block; }

        /* Main Dashboard Menu Buttons Layout */
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 30px;
        }
        .menu-btn {
            background: #243146;
            color: white;
            border: 2px solid #2d3748;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s ease;
        }
        .menu-btn:active { transform: scale(0.98); }
        .menu-btn.primary { border-color: #ff6b00; background: #1f2636; }
        .btn-icon { font-size: 1.6rem; }
        
        /* Action Utility Header Bar */
        .screen-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 15px;
        }
        .back-btn {
            background: #243146;
            color: #edf2f7;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        /* Uploader Module Layout Box */
        .upload-box {
            background: #171d29;
            padding: 30px 20px;
            border-radius: 12px;
            text-align: center;
            border: 2px dashed #ff6b00;
        }
        .upload-box input { display: none; }
        .select-file-btn {
            background: #ff6b00;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
            box-shadow: 0 4px 12px rgba(255,107,0,0.3);
        }
        .db-status { font-size: 0.95rem; color: #a0aec0; margin-top: 12px; font-weight: 500; }

        /* Hardware Scanner Layout Frame Elements */
        #reader { width: 100%; border-radius: 14px; overflow: hidden; background: #171d29; }
        
        /* Scan Evaluation Results Popup Layout Card */
        .ticket-card {
            margin-top: 25px;
            background: #171d29;
            border-radius: 14px;
            overflow: hidden;
            border-top: 6px solid #ff6b00;
            display: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .status-header { padding: 14px; font-weight: bold; font-size: 1.15rem; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-granted { background-color: #10b981; }
        .status-denied { background-color: #ef4444; }
        .status-duplicate { background-color: #f59e0b; }
        .ticket-body { padding: 20px; }
        .field-group { margin-bottom: 15px; }
        .field-label { font-size: 0.75rem; text-transform: uppercase; color: #718096; letter-spacing: 1px; margin-bottom: 3px; }
        .field-value { font-size: 1.1rem; color: #edf2f7; font-weight: 500; }
        .founder-badge { display: inline-block; background: #ff6b00; color: black; padding: 4px 12px; border-radius: 6px; font-weight: bold; font-size: 0.85rem; margin-top: 4px; }

        /* Data Matrix List Sheet Layout styling */
        .table-wrapper { overflow-x: auto; max-height: 400px; margin-top: 10px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th, td { padding: 12px; border-bottom: 1px solid #2d3748; }
        th { background-color: #243146; color: #a0aec0; font-weight: 600; }
        .action-btn { background: #0076ff; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        #hiddenQr { display: none; }
    </style>
</head>
<body>

<div class="container">

    <div id="menuScreen" class="app-screen active">
        <h2>SMC 26 Portal</h2>
        <h3>Event Management Dashboard</h3>
        
        <div class="menu-grid">
            <button class="menu-btn primary" onclick="navigateTo('importScreen')">
                <span class="btn-icon">📋</span>
                <div>
                    <div>1. Import Database</div>
                    <span style="font-size: 0.8rem; font-weight: normal; color: #a0aec0;">Upload spreadsheet & manage links</span>
                </div>
            </button>
            
            <button class="menu-btn" onclick="navigateTo('scannerScreen')">
                <span class="btn-icon">📷</span>
                <div>
                    <div>2. Launch Camera Scanner</div>
                    <span style="font-size: 0.8rem; font-weight: normal; color: #a0aec0;">Scan attendee passport codes</span>
                </div>
            </button>
        </div>
    </div>

    <div id="importScreen" class="app-screen">
        <div class="screen-header">
            <span style="font-weight: bold; font-size: 1.1rem;">Database Manager</span>
            <button class="back-btn" onclick="navigateTo('menuScreen')">⬅️ Back</button>
        </div>

        <div class="upload-box">
            <p style="margin: 0; font-size: 0.95rem; color: #edf2f7;">Upload your Google Sheet CSV document file</p>
            <label class="select-file-btn" for="csvFile">Choose CSV File</label>
            <input type="file" id="csvFile" accept=".csv">
            <div id="dbStatus" class="db-status">🔴 System offline. No data loaded.</div>
        </div>

        <div id="generatorPanel" style="margin-top: 30px; display: none;">
            <h3 style="text-align: left; margin-bottom: 10px;">Founder Passport Links</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Action Toolkit</th>
                        </tr>
                    </thead>
                    <tbody id="generatorTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="scannerScreen" class="app-screen">
        <div class="screen-header">
            <span style="font-weight: bold; font-size: 1.1rem;">Live Access Control</span>
            <button class="back-btn" onclick="navigateTo('menuScreen')">⬅️ Exit Cam</button>
        </div>

        <div id="reader"></div>

        <div id="ticketCard" class="ticket-card">
            <div id="statusBanner" class="status-header">Decoding Core Code...</div>
            <div class="ticket-body">
                <div class="field-group"><div class="field-label">Full Name</div><div id="displayName" class="field-value">-</div></div>
                <div class="field-group"><div class="field-label">Church / Ministry</div><div id="displayChurch" class="field-value">-</div></div>
                <div class="field-group"><div class="field-label">Status Details</div><div id="displayStatus" class="field-value">-</div></div>
            </div>
        </div>
    </div>

</div>

<div id="hiddenQr"></div>

<script>
    let localDatabase = {};
    let checkedInCache = new Set();
    let html5QrcodeScanner = null;
    const BASE_SCANNER_URL = window.location.origin + window.location.pathname;

    function navigateTo(screenId) {
        document.querySelectorAll('.app-screen').forEach(screen => screen.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');

        if (screenId === 'scannerScreen') {
            startHardwareBackCamera();
        } else {
            killHardwareCamera();
        }
    }

    // UPDATED PARSER: Perfectly matches the clean 'rearranged_founders_data.csv' column headers
    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                localDatabase = {};
                const tableBody = document.getElementById('generatorTableBody');
                tableBody.innerHTML = ""; 
                
                let founderCount = 0;

                results.data.forEach(row => {
                    const id = row["Guest ID"];
                    if(id) {
                        const cleanId = id.trim();
                        
                        localDatabase[cleanId] = {
                            title: (row["Title"] || "").trim(),
                            name: (row["Full Name"] || "").trim(),
                            church: (row["Church"] || "").trim(),
                            specialStatus: (row["Special Status"] || "").trim(),
                            dinnerAccess: String(row["Dinner Access"]).toUpperCase() === "TRUE"
                        };

                        if (localDatabase[cleanId].specialStatus === "Founder in-person") {
                            founderCount++;
                            const generatedLink = `${BASE_SCANNER_URL}?id=${cleanId}`;
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td><b>${localDatabase[cleanId].title} ${localDatabase[cleanId].name || 'Blank ID'}</b><br><span style="font-size:0.72rem; color:#718096;">ID: ${cleanId}</span></td>
                                <td>
                                    <button class="action-btn" onclick="navigator.clipboard.writeText('${generatedLink}'); alert('Link Copied!');">📋 Link</button>
                                    <button class="action-btn" style="background:#ff6b00; margin-top:4px;" onclick="downloadQrCode('${cleanId}', '${localDatabase[cleanId].name || cleanId}')">🖼️ QR</button>
                                </td>
                            `;
                            tableBody.appendChild(tr);
                        }
                    }
                });

                const totalRows = Object.keys(localDatabase).length;
                if(totalRows > 0) {
                    document.getElementById('dbStatus').innerText = `🟢 Connected. Loaded ${totalRows} records. (${founderCount} Founders mapped)`;
                    document.getElementById('dbStatus').style.color = "#10b981";
                    document.getElementById('generatorPanel').style.display = "block";
                }
            }
        });
    });

    function startHardwareBackCamera() {
        if(html5QrcodeScanner === null) {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: 250,
                videoConstraints: { facingMode: { exact: "environment" } }
            });
        }
        html5QrcodeScanner.render(onScanSuccess, onScanError);
    }

    function killHardwareCamera() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear().catch(err => console.log("Camera closed."));
        }
    }

    function downloadQrCode(guestId, guestName) {
        const qrContainer = document.getElementById('hiddenQr');
        qrContainer.innerHTML = ""; 
        new QRCode(qrContainer, { text: guestId, width: 256, height: 256 });
        setTimeout(() => {
            const img = qrContainer.querySelector('img');
            if(img) {
                const a = document.createElement('a');
                a.href = img.src;
                a.download = `QR_Founder_${guestName.replace(/\s+/g, '_')}.png`;
                a.click();
            }
        }, 300);
    }

    function processAccess(guestId) {
        const card = document.getElementById('ticketCard');
        const banner = document.getElementById('statusBanner');
        card.style.display = "block";
        const cleanedId = guestId.trim();

        if (!localDatabase[cleanedId]) {
            banner.className = "status-header status-denied";
            banner.innerText = "❌ Ticket ID Not Found";
            return;
        }

        const guest = localDatabase[cleanedId];
        
        // Handle names gracefully for blank pre-allocated rows
        const formattedDisplayName = guest.name ? `${guest.title} ${guest.name}`.trim() : "Guest Details Not Yet Filled";
        document.getElementById('displayName').innerText = formattedDisplayName;
        document.getElementById('displayChurch').innerText = guest.church || "N/A";
        
        const statusDiv = document.getElementById('displayStatus');
        if(guest.specialStatus === "Founder in-person") {
            statusDiv.innerHTML = `<span class="founder-badge">⭐ FOUNDER IN-PERSON</span>`;
        } else {
            statusDiv.innerText = guest.specialStatus || "Regular Guest";
        }

        if (!guest.dinnerAccess) {
            banner.className = "status-header status-denied";
            banner.innerText = "❌ No Dinner Access Pass";
            return;
        }
        if (checkedInCache.has(cleanedId)) {
            banner.className = "status-header status-duplicate";
            banner.innerText = "⚠️ Duplicate: Already Checked In";
            return;
        }

        checkedInCache.add(cleanedId);
        banner.className = "status-header status-granted";
        banner.innerText = "✅ Access Granted";
    }

    function onScanSuccess(decodedText) {
        killHardwareCamera();
        processAccess(decodedText);
        setTimeout(() => { startHardwareBackCamera(); }, 4000);
    }
    
    function onScanError(err) {}

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('id')) {
        navigateTo('scannerScreen');
        setTimeout(() => { processAccess(urlParams.get('id')); }, 500);
    }
</script>
</body>
</html>
